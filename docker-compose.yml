version: '3.9'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gym-api-app
    restart: unless-stopped
    volumes:
      - ./:/var/www/html
    working_dir: /var/www/html
    ports:
      - "9000:9000"
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost
      DB_CONNECTION: pgsql
      DB_HOST: host.docker.internal
      DB_PORT: 5432
      DB_DATABASE: gym_api
      DB_USERNAME: master
      DB_PASSWORD: sistemas

  web:
    image: nginx:stable-alpine
    container_name: gym-api-web
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
